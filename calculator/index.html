<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <meta name="description" content="A modern scientific calculator built with HTML, CSS and JavaScript.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="calculator-wrapper">
        <div class="calculator">

            <!-- Header -->
            <div class="calc-header">
                <span class="calc-title">Scientific</span>
                <div class="mode-toggle">
                    <button class="mode-btn active" id="btn-deg" onclick="setAngleMode('deg')">DEG</button>
                    <button class="mode-btn" id="btn-rad" onclick="setAngleMode('rad')">RAD</button>
                </div>
                <div class="memory-indicator" id="mem-indicator" title="Memory stored"></div>
            </div>

            <!-- Display -->
            <div class="display-section">
                <div class="history-line" id="history-line"></div>
                <div class="expression-display" id="expression">0</div>
                <div class="result-preview" id="result-preview"></div>
            </div>

            <!-- Buttons -->
            <div class="buttons-area">

                <!-- Scientific panel -->
                <div class="sci-panel">
                    <button class="btn btn-sci" onclick="insertFunc('sin(')">sin</button>
                    <button class="btn btn-sci" onclick="insertFunc('cos(')">cos</button>
                    <button class="btn btn-sci" onclick="insertFunc('tan(')">tan</button>
                    <button class="btn btn-sci" onclick="insertFunc('asin(')">sin⁻¹</button>

                    <button class="btn btn-sci" onclick="insertFunc('log10(')">log</button>
                    <button class="btn btn-sci" onclick="insertFunc('log(')">ln</button>
                    <button class="btn btn-sci" onclick="insertFunc('sqrt(')">√x</button>
                    <button class="btn btn-sci" onclick="insertFunc('cbrt(')">∛x</button>

                    <button class="btn btn-sci" onclick="appendToExpression('^2')">x²</button>
                    <button class="btn btn-sci" onclick="appendToExpression('^3')">x³</button>
                    <button class="btn btn-sci" onclick="appendToExpression('^(')">xʸ</button>
                    <button class="btn btn-sci" onclick="insertFunc('abs(')">|x|</button>

                    <button class="btn btn-sci" onclick="appendToExpression('PI')">π</button>
                    <button class="btn btn-sci" onclick="appendToExpression('E')">e</button>
                    <button class="btn btn-sci" onclick="insertFunc('fac(')">n!</button>
                    <button class="btn btn-sci" onclick="insertFunc('exp(')">eˣ</button>

                    <button class="btn btn-sci" onclick="appendToExpression('(')"> ( </button>
                    <button class="btn btn-sci" onclick="appendToExpression(')')"> ) </button>
                    <button class="btn btn-mem" id="btn-ms" onclick="memoryStore()" title="Memory Store">MS</button>
                    <button class="btn btn-mem" id="btn-mr" onclick="memoryRecall()" title="Memory Recall">MR</button>
                </div>

                <!-- Standard numpad -->
                <div class="std-panel">
                    <button class="btn btn-function" onclick="clearAll()">AC</button>
                    <button class="btn btn-function" onclick="backspace()">⌫</button>
                    <button class="btn btn-function" onclick="toggleSign()">+/−</button>
                    <button class="btn btn-operator" onclick="appendToExpression('÷')">÷</button>

                    <button class="btn btn-number" onclick="appendToExpression('7')">7</button>
                    <button class="btn btn-number" onclick="appendToExpression('8')">8</button>
                    <button class="btn btn-number" onclick="appendToExpression('9')">9</button>
                    <button class="btn btn-operator" onclick="appendToExpression('×')">×</button>

                    <button class="btn btn-number" onclick="appendToExpression('4')">4</button>
                    <button class="btn btn-number" onclick="appendToExpression('5')">5</button>
                    <button class="btn btn-number" onclick="appendToExpression('6')">6</button>
                    <button class="btn btn-operator" onclick="appendToExpression('-')">−</button>

                    <button class="btn btn-number" onclick="appendToExpression('1')">1</button>
                    <button class="btn btn-number" onclick="appendToExpression('2')">2</button>
                    <button class="btn btn-number" onclick="appendToExpression('3')">3</button>
                    <button class="btn btn-operator" onclick="appendToExpression('+')">+</button>

                    <button class="btn btn-number btn-zero" onclick="appendToExpression('0')">0</button>
                    <button class="btn btn-number" onclick="appendToExpression('.')">.</button>
                    <button class="btn btn-equals" id="btn-equals" onclick="calculate()">=</button>
                </div>

            </div><!-- /.buttons-area -->
        </div><!-- /.calculator -->

        <p class="footer-text">Scientific Calculator &nbsp;·&nbsp; Open Source</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
